# MassSpecGym Model Card
# Identity
method_name: "TTT-msms"          # Test-Time Tuned Language Models
paper_url: ""            
code_url: ""             
random_seed: 42        

# Results entries
results:
  - task: "de_novo"             
    challenge: "bonus"        # Uses chemical formula as a hard constraint for SMILES generation
    results_csv: "results/ttt_msms_massspecgym.csv"      
    uses_formula_at_inference: true  

# Model architecture
uses_mist_encoder: false     # Uses a custom end-to-end transformer encoder-decoder
uses_mist_cf: false          # Directly incorporates the formula into the SMILES generation process
uses_iceberg: false          

mist_cf_version: ""          
iceberg_version: ""          

architecture_notes: >
  TTT-msms is an end-to-end transformer framework that maps tokenized mass spectra 
  and chemical formulae directly to SMILES sequences. Unlike multi-stage pipelines, 
  it eliminates intermediate fingerprint prediction. It features a retrieval-guided 
  Test-Time Tuning (TTT) procedure that transductively adapts the model to experimental 
  spectra by selecting and training on structurally relevant samples from a 
  candidate pool during inference.

# Pretraining data
pretraining:
  used: true              
  description: >
    The model is extensively pretrained on a large corpus of simulated MS/MS spectra 
    to learn the fundamental relationships between fragmentation patterns and structures. 
    It also utilizes a fingerprint-based auxiliary loss to enhance structural consistency.
  filtering_criterion: "exact_match"  
  inchikey_layer_used: "27char"  
  parquet_url: ""          

# Evaluation setup
uses_official_split: true    
custom_split_path: ""

evaluation_notes: >
  Evaluated on MassSpecGym and NPLIB1. The model demonstrates significant relative 
  improvements in molecular similarity (Tanimoto/MCES) compared to static fine-tuning 
  baselines, particularly when handling out-of-distribution experimental data.

# Notes for reviewers
notes: ""