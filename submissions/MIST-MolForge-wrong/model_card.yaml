# MassSpecGym Model Card
# Identity
method_name: "MIST + MOLFORGE"
paper_url: ""
code_url: ""
random_seed: null # Not explicitly stated in the text [cite: 1-221]

# Results entries
results:
  - task: "de_novo"
    challenge: "standard"
    results_csv: "results/mist_molforge_massspecgym.csv"
    uses_formula_at_inference: true

# Model architecture
uses_mist_encoder: true
uses_mist_cf: true
uses_iceberg: false

mist_cf_version: "pretrained_from_diffms"
iceberg_version: ""

architecture_notes: >
  This is a two-stage pipeline consisting of (1) encoding mass spectra into molecular 
  fingerprints using a pretrained MIST encoder, and (2) decoding 
  those fingerprints into molecular structures using the MOLFORGE decoder. 
  The MIST encoder utilizes a chemical formula transformer to process mass spectra peaks 
  annotated with chemical formulae. Predicted fingerprints are 
  generated as probabilities; a threshold of t=0.5 is applied to convert 
  these into a discrete set of "on-bit" indices. MOLFORGE, an 
  autoregressive transformer, takes these indices as input to predict a 
  SMILES string. The model employs a beam search strategy 
  (beam size = 10) to generate the top-k molecular predictions. 
  The final structure is verified using InChIs to ensure uniqueness.

# Pretraining data
pretraining:
  used: true
  description: >
    The MOLFORGE decoder is trained on a large-scale combined dataset containing 
    approximately 2 million unique compounds. This dataset 
    includes data from DSSTox, HMDB, COCONUT, and MOSES. The MIST 
    encoder uses pretrained weights from the DIFFMS project, which were originally 
    trained on the MassSpecGym training split.
  filtering_criterion: "exact_match"
  inchikey_layer_used: "not_specified"
  parquet_url: ""
  filtering_notes: >
    The 2M compound training set for the decoder was specifically filtered to 
    exclude any molecules present in the MassSpecGym test set to ensure 
    generalization to novel structures. Training was performed 
    over 6 epochs with a learning rate of 0.0005.

# Evaluation setup
uses_official_split: true
custom_split_path: ""

evaluation_notes: >
  Evaluation is performed on the MassSpecGym benchmark. Metrics 
  reported include Top-1 and Top-10 Accuracy (exact match), Maximum Common 
  Edge Subgraph (MCES) distance, and Tanimoto similarity of Morgan fingerprints. Morgan fingerprints were generated using RDKit with a 
  radius of 2 and a size of 4096 bits[cite: 206, 213]. Accuracy is determined by 
  comparing the predicted structures to ground truth using InChI strings.

# Notes for reviewers
notes: ""