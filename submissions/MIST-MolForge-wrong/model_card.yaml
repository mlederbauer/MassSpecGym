# Model architecture
uses_mist_encoder: true
uses_mist_cf: false   # Formula annotations come from ground truth at inference, not MIST-CF predictor
uses_iceberg: false

mist_cf_version: ""
iceberg_version: ""

architecture_notes: >
  Two-stage pipeline: (1) MIST encoder (pretrained weights from DiffMS, Goldman et al. 2023)
  maps mass spectra to 4096-bit Morgan fingerprint probabilities; threshold t=0.5 converts
  probabilities to on-bit indices. (2) MolForge (Ucak et al. 2023) autoregressive transformer
  decodes on-bit indices to SMILES via beam search (beam size=10). Chemical formula is
  provided as ground-truth input to MIST peak annotation (bonus tier). Fingerprints are
  4096-bit Morgan (RDKit, radius=2).

# Pretraining data
pretraining:
  used: true
  description: >
    MolForge decoder retrained on ~2M compounds from DiffMS combined dataset
    (DSSTox, HMDB, COCONUT, MOSES). Training: 6 epochs, lr=5e-4, batch=128,
    Nvidia A40 GPU (~3 days). MIST encoder uses DiffMS pretrained weights
    (trained on MassSpecGym training split + NPLIB1/CANOPUS).
  filtering_criterion: "exact_match"
  inchikey_layer_used: "27char"  # Follows DiffMS exclusion logic (see DiffMS model card)
  parquet_url: "https://zenodo.org/records/15122968"  # DiffMS combined dataset

# Evaluation setup
uses_official_split: true
custom_split_path: ""

# Notes for reviewers
notes: ""