    challenge: "bonus"         # Formula provided as input at inference (Appendix A)
    uses_formula_at_inference: true

    paper: "One Small Step with Fingerprints, One Giant Leap for De Novo Molecule Generation from Mass Spectra"
    doi: "https://arxiv.org/abs/2508.04180"
    publication_date: "2025-09-04"
    comment: ""

    # No bootstrap CIs reported in the paper. Maintainer must request from authors.
