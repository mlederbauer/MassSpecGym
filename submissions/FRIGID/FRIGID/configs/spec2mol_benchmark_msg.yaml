# Spec2Mol benchmark configuration for MassSpecGym dataset
#
# Usage:
#   python scripts/benchmark_spec2mol.py --config configs/spec2mol_benchmark_msg.yaml
#
# Key differences from CANOPUS:
#   - MIST encoder: hidden_size=640, magma_modulo=2048 (Large Model)
#   - Data paths point to MassSpecGym dataset

# CANOPUS data paths
data:
  datadir: "/path/to/data/msg"
  labels_file: "/path/to/data/msg/labels.tsv"
  split_file: "/path/to/data/msg/split.tsv"
  spec_folder: "/path/to/data/msg/spec_files"
  subform_folder: "/path/to/data/msg/subformulae/default_subformulae"
  hf_cache_dir: /path/to/data/safes/

# MIST encoder configuration
mist_encoder:
  checkpoint: "/path/to/checkpoints/mist_msg.pt"
  hidden_size: 640              # MSG Large Model (CANOPUS uses 640)
  magma_modulo: 2048             # MSG Large Model (CANOPUS uses 512)
  peak_attn_layers: 2
  num_heads: 8
  spectra_dropout: 0.1
  output_size: 4096
  form_embedder: "pos-cos"
  set_pooling: "cls"
  refine_layers: 4
  pairwise_featurization: true
  embed_instrument: false
  inten_transform: "float"
  inten_prob: 0.1
  remove_prob: 0.5
  cls_type: "ms1"
  spec_features: "peakformula"
  mol_features: "fingerprint"
  top_layers: 1
  max_peaks: null

# DLM decoder (same as CANOPUS - decoder is shared)
dlm:
  checkpoint: "/path/to/checkpoints/dlm.ckpt"

# Fingerprint settings
fingerprint:
  bits: 4096
  radius: 2
  threshold: 0.187

# Generation settings
generation:
  batch_size: 16
  softmax_temp: 1.0
  randomness: 10.0
  top_k: 100

# Formula filter settings
formula_filter:
  n_required: 10
  max_attempts: 100

# Evaluation settings
evaluation:
  split: "test"
  max_spectra: null  # Test all samples in test set (803 samples)
  metrics:
    - accuracy
    - tanimoto

# Output settings
output:
  results_dir: "results/benchmarks_msg"

