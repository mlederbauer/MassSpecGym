# Model architecture
uses_mist_encoder: false     # Uses custom Transformer encoder for peaks
uses_mist_cf: true           # Uses MIST's peak formula annotation code for featurization [cite: 169]
uses_iceberg: false
mist_cf_version: "Used for peak formula annotation via enumeration strategy [cite: 169]"
iceberg_version: ""

# Pretraining data
pretraining:
  used: false                # Trained specifically on MassSpecGym splits [cite: 150, 227]
  description: ""
  filtering_criterion: ""
  inchikey_layer_used: ""
  parquet_url: ""

# Evaluation setup
uses_official_split: true    # Evaluated on MassSpecGym benchmark [cite: 150, 216]
custom_split_path: ""

# Notes for reviewers
notes: "MVP leverages four views: molecular graphs, fingerprints, individual spectra, and consensus spectra. The reported results utilize the 'aggregate-then-rank' strategy (mol-cs), which the authors found superior to rank aggregation[cite: 163, 426]. Note that performance relies on MIST-based peak labeling[cite: 169]."