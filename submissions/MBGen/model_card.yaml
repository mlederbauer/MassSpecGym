      Top-10 Tanimoto CI High: 0.00

# Model architecture
uses_mist_encoder: true [cite: 139] # Uses the pretrained MIST Formula Transformer[cite: 139].
uses_mist_cf: false [cite: 144]     # Uses SIRIUS for formula annotation instead[cite: 144].
uses_iceberg: false 

mist_cf_version: ""
iceberg_version: ""

# Pretraining data
pretraining:
  used: true [cite: 234, 237]
  description: "The decoder is pretrained on 2.8 million fingerprint-molecule pairs from DSSTox, HMDB, COCONUT, and MOSES[cite: 247]. The spectrum encoder is pretrained on NPLIB1 and MassSpecGym[cite: 234]."
  filtering_criterion: "exact_match" # Follows the DiffMS strategy for data handling[cite: 234].
  inchikey_layer_used: "27char"      # Implied by standard database deduplication[cite: 247].
  parquet_url: "" 

# Evaluation setup
uses_official_split: true [cite: 248] 
custom_split_path: ""

# Notes for reviewers
notes: "MBGen adopts an edge-centric approach, focusing on bond connectivity rather than just atom positions to better reflect chemical fragmentation principles[cite: 48, 59]. The many-body attention module is specifically designed to resolve structural isomers by modeling triplet interactions[cite: 60, 159]."