      Top-1 Tanimoto CI Low: 0.00
      Top-1 Tanimoto CI High: 0.00
      Top-10 Accuracy: 12.54 [cite: 252]
      Top-10 Accuracy CI Low: 0.00
      Top-10 Accuracy CI High: 0.00
