# Identity
method_name: "MBGen" [cite: 13]
paper_url: "https://arxiv.org/abs/2602.01643v1" [cite: 1]
code_url: "https://github.com/biomed-AI/MBGen" [cite: 18]
random_seed: null 

# Results
results:
  - task: "de_novo" [cite: 13, 127]
    challenge: "bonus" # Marked bonus because it uses chemical formulas to fix the node set at inference[cite: 129].
    uses_formula_at_inference: true [cite: 129]
    paper: "De Novo Molecular Generation from Mass Spectra via Many-Body Enhanced Diffusion" [cite: 2]
    doi: "https://arxiv.org/abs/2602.01643v1" [cite: 1]
    publication_date: "2026-02-02" [cite: 1]
    comment: "Uses an edge-centric diffusion strategy with a many-body attention mechanism to capture higher-order interactions[cite: 48, 50]."

    metrics:
      # Results from MassSpecGym benchmark [cite: 252, 253]
      Top-1 Accuracy: 7.58 [cite: 252]
      Top-1 Accuracy CI Low: 0.00
      Top-1 Accuracy CI High: 0.00
