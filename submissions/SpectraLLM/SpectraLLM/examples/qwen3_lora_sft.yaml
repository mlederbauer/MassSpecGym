# Qwen3-32B 模型 LoRA 微调配置文件 - 基于finetune.sh

# 基本配置
home_dir: /data/home/zdhs0020/code/spectraLLM_main
model_name_or_path: /data/group/project1/models/Qwen3-32B
stage: sft
do_predict: true
finetuning_type: lora
template: qwen3

# 适配器配置
adapter_name_or_path: ${home_dir}/adapters/mix_all_singleSpecs

# 量化配置
quantization_method: hqq

# 数据配置
dataset_dir: ${home_dir}/data/
eval_dataset: qm9s_all_test
cutoff_len: 2000
max_samples: 5000
preprocessing_num_workers: 48

# 预测参数
per_device_eval_batch_size: 8
predict_with_generate: true
max_new_tokens: 1024

# 输出配置
output_dir: ${home_dir}/data/test/mix_all_singleSpecs/qm9s_all_test

# 性能优化
flash_attn: auto
trust_remote_code: true

# SwanLab 监控被禁用（与环境变量 SWANLAB_MODE: disabled 保持一致）
# use_swanlab: false