name: Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - "submissions/**"

jobs:
  regenerate-csvs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml

      - name: Regenerate results CSVs from model cards
        run: python scripts/generate_results_csvs.py

      - name: Commit updated CSVs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/*.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "leaderboard: regenerate results CSVs from model cards [skip ci]"
            git push
          fi
